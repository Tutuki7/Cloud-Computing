- name: Add prometheus-community Helm repo
  kubernetes.core.helm_repository:
    name: prometheus-community
    repo_url: "https://prometheus-community.github.io/helm-charts"

- name: Assert WEB_HOST is defined
  ansible.builtin.assert:
    that:
      - web_host is defined
      - web_host | length > 0
    fail_msg: "WEB_HOST environment variable is not set"

- name: Install kube-prometheus-stack
  kubernetes.core.helm:
    name: monitoring
    chart_ref: prometheus-community/kube-prometheus-stack
    release_namespace: monitoring
    create_namespace: true
    wait: true
    values:
      grafana:
        adminPassword: yourpassword
        "grafana.ini":
          server:
            domain: "{{ grafana_domain }}"
            root_url: "%(protocol)s://%(domain)s/"
            serve_from_sub_path: false
          security:
            allow_embedding: true
            cookie_samesite: disabled
            csrf_trusted_origins: "{{ grafana_domain }}"
          analytics:
            check_for_updates: true
          log:
            mode: console
          unified_storage:
            index_path: /var/lib/grafana-search/bleve
      prometheus:
        prometheusSpec:
          retention: 7d
          podMonitorSelectorNilUsesHelmValues: false
          serviceMonitorSelectorNilUsesHelmValues: false
          additionalScrapeConfigsSecret:
            name: additional-scrape-configs
            key: prometheus-additional.yaml
            optional: true
      alertmanager:
        enabled: true

- name: Apply postgres exporters
  kubernetes.core.k8s:
    state: present
    src: "{{ manifests_dir }}/16-monitoring-postgres.yaml"

- name: Apply monitoring bridge
  kubernetes.core.k8s:
    state: present
    src: "{{ manifests_dir }}/17-monitoring-bridge.yaml"

- name: Apply scrape config
  kubernetes.core.k8s:
    state: present
    src: "{{ manifests_dir }}/18-monitoring-scrape.yaml"