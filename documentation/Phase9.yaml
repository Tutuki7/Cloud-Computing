openapi: 3.1.0
info:
  title: "Group8 API"
  description: |
    A platform offering a unified movie catalog, public review system, personal watchlists, and personalized recommendations. 
  version: "2.0.0"

servers:
  - url: https://{NGINX-IP}.nip.io

tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Movies
  - name: Cast
  - name: Genres
  - name: Badges
  - name: Watchlists
  - name: Subscriptions
  - name: Reviews
  - name: Recommendations

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Obtain a token via `POST /login` (users-service) or directly from Keycloak.
        Paste the `access_token` value here.
  schemas:
    HTTPValidationError:
      type: object
      title: HTTPValidationError
      properties:
        detail:
          type: array
          title: Detail
          items:
            $ref: "#/components/schemas/ValidationError"

    ValidationError:
      type: object
      title: ValidationError
      required:
        - loc
        - msg
        - type
      properties:
        loc:
          type: array
          title: Location
          items:
            anyOf:
              - type: string
              - type: integer
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
    
    # Auth  ---------------------------------------------------------------------
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          examples: [admin]
        password:
          type: string
          format: password
          examples: [AdminPassword123!@%]

    TokenResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
          description: Keycloak JWT — use as Bearer token
        refresh_token:
          type: string
        token_type:
          type: string
          examples: [bearer]
        expires_in:
          type: integer
          description: Token lifetime in seconds
          examples: [900]

    # Users ---------------------------------------------------------------
    UserRegister:
      type: object
      required:
        - username
        - email
        - password
        - firstName
        - lastName
        - termsAccepted
      properties:
        username:
          type: string
          description: Unique username
          examples: [johndoe]
        email:
          type: string
          format: email
          examples: [johndoe@example.com]
        password:
          type: string
          format: password
          description: >
            Minimum 15 characters. Must contain at least one uppercase letter,
            one digit and one special character.
        firstName:
          type: string
          examples: [John]
        lastName:
          type: string
          examples: [Doe]
        gender:
          type: string
          description: "One of: M (Male), F (Female), NB (Non-binary), O (Other)"
          enum: [M, F, NB, O]
        age:
          type: integer
          description: Age in years (optional)
          examples: [30]
        termsAccepted:
          type: boolean
          description: Must be true to complete registration

    UserUpdate:
      type: object
      description: All fields optional. Only provided fields will be updated.
      properties:
        username:
          type: string
          description: New unique username
        gender:
          type: string
          enum: [M, F, NB, O]
        age:
          type: integer

    UserResponse:
      type: object
      required:
        - user_id
        - username
        - email
        - is_admin
        - created_at
        - updated_at
      properties:
        user_id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        gender:
          type: string
        age:
          type: integer
        is_admin:
          type: boolean
          default: false
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    # Movies ------------------------------------------------------------------------
    CastMemberCreate:
      type: object
      required:
        - cast_name
      properties:
        cast_name:
          type: string
          description: Name of the cast member
          examples: [Tom Hanks]
        role:
          type: string
          description: Role in the movie
          examples: [Forrest Gump]

    CastMemberResponse:
      type: object
      required:
        - cast_id
        - cast_name
      properties:
        cast_id:
          type: integer
        cast_name:
          type: string
        role:
          type: string
          nullable: true

    MovieCreate:
      type: object
      required:
        - movie_title
        - release_year
      properties:
        movie_title:
          type: string
          examples: [Forrest Gump]
        description:
          type: string
          description: Movie synopsis
        imdb_url:
          type: string
          format: uri
          examples: [https://www.imdb.com/title/tt0109830/]
        release_year:
          type: integer
          description: Must be >= 1874
          examples: [1994]
        runtime:
          type: integer
          description: Runtime in minutes
          examples: [142]
        parental_rating:
          type: string
          examples: [PG-13]
        poster_url:
          type: string
          format: uri
        genres:
          type: array
          description: List of existing genre names to associate
          items:
            type: string
          examples:
            - [Drama, Romance]

    MovieUpdate:
      type: object
      description: All fields optional. Only provided fields will be updated. If `genres` is provided it replaces the entire genre list.
      properties:
        movie_title:
          type: string
        description:
          type: string
        imdb_url:
          type: string
          format: uri
        release_year:
          type: integer
        runtime:
          type: integer
        parental_rating:
          type: string
        poster_url:
          type: string
          format: uri
        genres:
          type: array
          items:
            type: string

    MovieResponse:
      type: object
      required:
        - movie_id
        - movie_title
        - release_year
        - is_deleted
      properties:
        movie_id:
          type: integer
        movie_title:
          type: string
        description:
          type: string
          nullable: true
        imdb_url:
          type: string
          nullable: true
        release_year:
          type: integer
        runtime:
          type: integer
          nullable: true
        parental_rating:
          type: string
          nullable: true
        poster_url:
          type: string
          nullable: true
        avg_rating:
          type: number
          format: float
          nullable: true
          description: Average user rating (populated from ratings service data)
        genres:
          type: array
          items:
            type: string
          default: []
        cast:
          type: array
          items:
            $ref: "#/components/schemas/CastMemberResponse"
          default: []
        is_deleted:
          type: boolean
          default: false

    GenreResponse:
      type: object
      required:
        - genre_id
        - name
      properties:
        genre_id:
          type: integer
        name:
          type: string
          examples: [Drama]
  
 # Badges -----------------------------------------------------------------
    BadgeCreate:
      type: object
      required: [title, milestone]
      properties:
        title:
          type: string
          minLength: 1
          examples: [First Review]
        milestone:
          type: integer
          minimum: 1
          examples: [10]
        description:
          anyOf:
            - type: string
            - type: "null"
          examples: [Awarded after 10 reviews]
    BadgeUpdate:
      type: object
      properties:
        title:
          anyOf:
            - type: string
              minLength: 1
            - type: "null"
        milestone:
          anyOf:
            - type: integer
              minimum: 1
            - type: "null"
        description:
          anyOf:
            - type: string
            - type: "null"
    BadgeOut:
      type: object
      required: [badge_id, title, milestone]
      properties:
        badge_id:
          type: integer
        title:
          type: string
        milestone:
          type: integer
        description:
          anyOf:
            - type: string
            - type: "null"
    AwardBadgeBody:
      type: object
      required: [badge_id]
      properties:
        badge_id:
          type: integer
          minimum: 1
          description: ID of the badge to award
    UserBadgeOut:
      type: object
      required: [badge_id, user_id, badge]
      properties:
        badge_id:
          type: integer
        user_id:
          type: string
        awarded_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        badge:
          $ref: "#/components/schemas/BadgeOut"
 
    # Subscriptions ----------------------------------------------------------
    CreateSubscription:
      type: object
      required: [type, status]
      properties:
        type:
          type: string
          enum: [free, premium]
        status:
          type: string
          enum: [active, pending, cancelled, expired]
        start_date:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        end_date:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
    UpdateSubscription:
      type: object
      properties:
        type:
          anyOf:
            - type: string
              enum: [free, premium]
            - type: "null"
        status:
          anyOf:
            - type: string
              enum: [active, pending, cancelled, expired]
            - type: "null"
        start_date:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        end_date:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
    Subscription:
      type: object
      required: [subscription_id, user_id, type, status]
      properties:
        subscription_id:
          type: integer
        user_id:
          type: integer
        type:
          type: string
        status:
          type: string
        start_date:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        end_date:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
 
    # Reviews / Ratings ------------------------------------------------------
    RatingCreate:
      type: object
      required: [user_id, movie_id, rating]
      properties:
        user_id:
          type: integer
          description: ID of the user submitting the rating
        movie_id:
          type: integer
          description: ID of the movie being rated
        rating:
          type: number
          minimum: 0
          maximum: 5
          description: Rating value between 1 and 5
        review:
          anyOf:
            - type: string
            - type: "null"
          description: Optional text review
        tag:
          anyOf:
            - type: string
            - type: "null"
          description: Optional tag
    MovieRating:
      type: object
      required: [user_id, rating]
      properties:
        user_id:
          type: integer
          description: ID of the user submitting the rating
        rating:
          type: number
          minimum: 1
          maximum: 5
        review:
          anyOf:
            - type: string
            - type: "null"
        tag:
          anyOf:
            - type: string
            - type: "null"
    UpdateRating:
      type: object
      properties:
        rating:
          anyOf:
            - type: number
              minimum: 0
              maximum: 5
            - type: "null"
          description: Updated rating value
        review:
          anyOf:
            - type: string
            - type: "null"
          description: Updated text review
        tag:
          anyOf:
            - type: string
            - type: "null"
    Rating:
      type: object
      required: [rating_id, user_id, movie_id, rating]
      properties:
        rating_id:
          type: integer
        user_id:
          type: integer
        movie_id:
          type: integer
        rating:
          type: number
          minimum: 1
          maximum: 5
        review:
          anyOf:
            - type: string
            - type: "null"
        tag:
          anyOf:
            - type: string
            - type: "null"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
 
    # Recommendations --------------------------------------------------------
    CreateUserPreference:
      type: object
      required: [genre_id]
      properties:
        genre_id:
          type: integer
          description: ID of the genre
        preference_type:
          type: string
          description: "Type of preference: 'like', 'dislike', or 'neutral'"
          default: like
    UserPreference:
      type: object
      required: [user_id, genre_id]
      properties:
        user_id:
          type: integer
        genre_id:
          type: integer
        preference_type:
          type: string
          default: like
    ReferenceMovie:
      type: object
      required: [movie_id, user_id]
      properties:
        movie_id:
          type: integer
        user_id:
          type: integer
    Recommendation:
      type: object
      required: [movie_id, title]
      properties:
        movie_id:
          type: integer
          description: ID of the recommended movie
        title:
          type: string
          description: Title of the recommended movie
    ExplainedRecommendation:
      type: object
      required: [movie_id, title, explaination]
      properties:
        movie_id:
          type: integer
          description: ID of the recommended movie
        title:
          type: string
          description: Title of the recommended movie
        explaination:
          type: string
          description: Explanation of why the movie was recommended
 
    # Watchlists -------------------------------------------------------------
    WatchlistCreate:
      type: object
      required: [user_id, title]
      properties:
        user_id:
          type: string
          minLength: 1
          examples: ["42"]
        title:
          type: string
          minLength: 1
          examples: [My Favourites]
    WatchlistUpdate:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          examples: [Updated Title]
    WatchlistOut:
      type: object
      required: [watchlist_id, user_id, title]
      properties:
        watchlist_id:
          type: integer
        user_id:
          type: string
        title:
          type: string
        created_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        updated_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
    WatchlistDetailOut:
      type: object
      required: [watchlist_id, user_id, title]
      properties:
        watchlist_id:
          type: integer
        user_id:
          type: string
        title:
          type: string
        created_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        updated_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        movies:
          type: array
          items:
            $ref: "#/components/schemas/WatchlistMovieOut"
          default: []
    WatchlistMovieOut:
      type: object
      required: [watchlist_id, movie_id]
      properties:
        watchlist_id:
          type: integer
        movie_id:
          type: integer
        added_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
    AddMovieBody:
      type: object
      required: [movie_id]
      properties:
        movie_id:
          type: integer
          minimum: 1
          description: ID of the movie to add

  parameters:
    user_id:
      name: user_id
      in: path
      required: true
      description: Unique identifier of the user
      schema:
        type: integer
    
    movie_id:
      name: movie_id
      in: path
      required: true
      description: Unique identifier of the movie
      schema:
        type: integer

    cast_id:
      name: cast_id
      in: path
      required: true
      description: Unique identifier of the cast member
      schema:
        type: integer

    badge_id:
      name: badge_id
      in: path
      required: true
      description: Unique identifier of the badge
      schema:
        type: integer
        minimum: 1

    watchlist_id:
      name: watchlist_id
      in: path
      required: true
      description: Unique identifier of the watchlist
      schema:
        type: integer
        minimum: 1

    rating_id:
      name: rating_id
      in: path
      required: true
      description: Unique identifier of the rating
      schema:
        type: integer
        
paths:
  # Health --------------------------------------------------------------------
  /users-service/health:
    get:
      summary: Users service health check
      operationId: users_health
      description: Returns the liveness status of the users-service.
      tags:
        - Health
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    examples: [ok]
  
  /movies-service/health:
    get:
      summary: Movies service health check
      operationId: movies_health
      description: Returns the liveness status of the movies-service.
      tags:
        - Health
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    examples: [ok]
    
  /subscriptions-service/health:
    get:
      summary: Movies service health check
      operationId: subscriptions_health
      description: Returns the liveness status of the subscriptions-service.
      tags:
        - Health
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    examples: [ok]
  
  /badges-service/health:
    get:
      tags: [Health]
      summary: Badges service health check
      operationId: badges_health
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, examples: [ok] }
 
  /reviews-service/health:
    get:
      tags: [Health]
      summary: Reviews service health check
      operationId: reviews_health
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, examples: [ok] }
 
  /recommendations-service/health:
    get:
      tags: [Health]
      summary: Recommendations service health check
      operationId: recommendations_health
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, examples: [ok] }
 
  /watchlists-service/health:
    get:
      tags: [Health]
      summary: Watchlists service health check
      operationId: watchlists_health
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, examples: [ok] }
  
  # Auth ------------------------------------------------------------------------
  /users-service/login:
    post:
      summary: Login
      operationId: login
      description: >
        Authenticate with username and password.
        Returns a Keycloak JWT `access_token` to use as `Bearer <token>` on protected endpoints.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        '401':
          description: Invalid username or password
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

  # Users ---------------------------------------------------------------------------
  /users-service/users:
    get:
      summary: List users
      operationId: list_users
      description: >
        Retrieve a paginated list of users. All filters are optional and combinable.
        Results are limited to `limit` entries starting at `offset`.
      tags:
        - Users
      parameters:
        - name: username
          in: query
          required: false
          description: Partial, case-insensitive match on username
          schema:
            type: string
        - name: gender
          in: query
          required: false
          description: "Exact match — one of: M, F, NB, O"
          schema:
            type: string
            enum: [M, F, NB, O]
        - name: age_min
          in: query
          required: false
          description: Minimum age (inclusive)
          schema:
            type: integer
        - name: age_max
          in: query
          required: false
          description: Maximum age (inclusive)
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          description: Maximum number of results (default 20)
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          description: Pagination offset (default 0)
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"
        '400':
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '500':
          description: Internal server error

    post:
      summary: Register user
      operationId: register_user
      description: >
        Register a new user. Creates the profile in the local database
        and registers the identity in Keycloak so the user can immediately log in.

        **Password rules:** minimum 15 characters, at least one uppercase letter,
        one digit and one special character.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegister"
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        '409':
          description: Username or email already exists
        '422':
          description: Validation error (password too weak, invalid gender, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '500':
          description: Internal server error

  /users-service/users/{user_id}:
    get:
      summary: Get user
      operationId: get_user
      description: Retrieve a single user profile by ID.
      tags:
        - Users
      parameters:
        - $ref: "#/components/parameters/user_id"
      responses:
        '200':
          description: User retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        '404':
          description: User not found
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '500':
          description: Internal server error

    put:
      summary: Update user
      operationId: update_user
      description: >
        Update the authenticated user's own profile.
        A user can only update their own account — attempting to update another user's profile returns 403.
      tags:
        - Users
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/user_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        '401':
          description: Missing or invalid Bearer token
        '403':
          description: Cannot update another user's profile
        '404':
          description: User not found
        '409':
          description: Username already taken
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '500':
          description: Internal server error

    delete:
      summary: Delete user
      operationId: delete_user
      description: >
        Delete the authenticated user's own account.
        Also removes the identity from Keycloak.
        A user can only delete their own account.
      tags:
        - Users
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/user_id"
      responses:
        '204':
          description: User deleted successfully
        '401':
          description: Missing or invalid Bearer token
        '403':
          description: Cannot delete another user's account
        '404':
          description: User not found
        '500':
          description: Internal server error

  /users-service/users/{user_id}/admin:
    patch:
      summary: Set admin privileges
      operationId: set_admin
      description: >
        Promote or revoke admin privileges for a user.
        **Requires admin Bearer token.**
        Updates both the local database flag and the Keycloak realm role.
      tags:
        - Users
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/user_id"
        - name: is_admin
          in: query
          required: false
          description: true to promote, false to revoke (default true)
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Admin status updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        '401':
          description: Missing or invalid Bearer token
        '403':
          description: Caller does not have the admin role
        '404':
          description: User not found
        '500':
          description: Internal server error

  # Movies -------------------------------------------------------------------
  /movies-service/movies:
    get:
      summary: List movies
      operationId: list_movies
      description: >
        Retrieve a paginated list of movies. Only returns non-deleted movies.
        All filters are optional and combinable.
      tags:
        - Movies
      parameters:
        - name: title
          in: query
          required: false
          description: Partial, case-insensitive match on movie title
          schema:
            type: string
        - name: genre
          in: query
          required: false
          description: Partial, case-insensitive match on genre name
          schema:
            type: string
        - name: release_year
          in: query
          required: false
          description: Exact release year filter
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          description: Maximum number of results (1–100, default 20)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          description: Pagination offset (default 0)
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Movies retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MovieResponse"
        '500':
          description: Internal server error

    post:
      summary: Create movie
      operationId: create_movie
      description: >
        Add a new movie to the catalog.
        **Requires admin Bearer token.**
        Genres must already exist in the database — see `GET /genres`.
      tags:
        - Movies
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieCreate"
      responses:
        '201':
          description: Movie created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieResponse"
        '401':
          description: Missing or invalid Bearer token
        '403':
          description: Admin role required
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '500':
          description: Internal server error

  /movies-service/movies/{movie_id}:
    get:
      summary: Get movie
      operationId: get_movie
      description: Retrieve a single non-deleted movie by ID, including its genres and cast.
      tags:
        - Movies
      parameters:
        - $ref: "#/components/parameters/movie_id"
      responses:
        '200':
          description: Movie retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieResponse"
        '404':
          description: Movie not found
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '500':
          description: Internal server error

    put:
      summary: Update movie
      operationId: update_movie
      description: >
        Update an existing movie.
        **Requires admin Bearer token.**
        All fields are optional. If `genres` is provided it **replaces** the entire genre list.
      tags:
        - Movies
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/movie_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieUpdate"
      responses:
        '200':
          description: Movie updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieResponse"
        '401':
          description: Missing or invalid Bearer token
        '403':
          description: Admin role required
        '404':
          description: Movie not found
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '500':
          description: Internal server error

    delete:
      summary: Delete movie
      operationId: delete_movie
      description: >
        Soft-delete a movie.
        **Requires admin Bearer token.**
        The movie is not physically removed — `is_deleted` is set to `true`
        and the movie is hidden from all listing and search results.
      tags:
        - Movies
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/movie_id"
      responses:
        '204':
          description: Movie soft-deleted successfully
        '401':
          description: Missing or invalid Bearer token
        '403':
          description: Admin role required
        '404':
          description: Movie not found
        '500':
          description: Internal server error

  
