apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-badges-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-badges
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-badges
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: postgres-badges
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_DB
              value: badges_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: group8-secret
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: group8-secret
                  key: DB_PASSWORD
          ports:
            - containerPort: 5432
              name: postgres
          readinessProbe:
            exec:
              command:
              - sh
              - -c
              - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
              - sh
              - -c
              - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: postgres-badges-storage
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
      volumes:
        - name: postgres-badges-storage
          persistentVolumeClaim:
            claimName: postgres-badges-pvc

---

apiVersion: v1
kind: Service
metadata:
  name: postgres-badges
  namespace: default
spec:
  selector:
    app: postgres-badges
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP