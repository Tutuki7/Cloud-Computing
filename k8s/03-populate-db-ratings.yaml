apiVersion: batch/v1
kind: Job
metadata:
  name: populate-db-ratings
  namespace: default
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: populate-db-ratings
          image: tpina17/populate-db-ratings:v2
          imagePullPolicy: Always
          env:
            - name: DB_HOST
              value: postgres-ratings
            - name: DB_NAME
              value: ratings_db
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: group8-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: group8-secret
                  key: DB_PASSWORD