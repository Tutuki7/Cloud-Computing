apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: review-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8003"
      labels:
        app: review-service
    spec:
      volumes:
        - name: gcp-sa-secret
          secret:
            secretName: gcp-sa-secret
      containers:
      - name: review-service
        image: jrcarrasqueira/review-service:v8
        imagePullPolicy: Always
        ports:
        - name: rest
          containerPort: 8003
        - name: grpc
          containerPort: 50055
        env:
        - name: DB_HOST
          value: postgres-ratings
        - name: DB_NAME
          value: ratings_db
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: group8-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: group8-secret
              key: DB_PASSWORD
        - name: USER_GRPC_URL
          valueFrom:
            configMapKeyRef:
              name: group8-config
              key: USER_GRPC_URL
        - name: MOVIE_GRPC_URL
          valueFrom:
            configMapKeyRef:
              name: group8-config
              key: MOVIE_GRPC_URL
        - name: PROJECT_ID
          valueFrom:
            configMapKeyRef:
              name: group8-config
              key: PROJECT_ID
        - name: PUBSUB_TOPIC
          valueFrom:
            configMapKeyRef:
              name: group8-config
              key: PUBSUB_TOPIC
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/var/secrets/google/sa-key.json"
        - name: KEYCLOAK_URL
          valueFrom:
            configMapKeyRef:
              name: group8-config
              key: KEYCLOAK_URL
        - name: KEYCLOAK_REALM
          valueFrom:
            configMapKeyRef:
              name: group8-config
              key: KEYCLOAK_REALM
        - name: KEYCLOAK_CLIENT_ID
          valueFrom:
            configMapKeyRef:
              name: group8-config
              key: KEYCLOAK_CLIENT_ID
        - name: KEYCLOAK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: group8-secret
              key: KEYCLOAK_CLIENT_SECRET
        - name: ROOT_PATH
          value: "/reviews-service"
        volumeMounts:
          - name: gcp-sa-secret
            mountPath: /var/secrets/google
            readOnly: true
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10  
          failureThreshold: 5   
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: review-service
  namespace: default
spec:
  selector:
    app: review-service
  ports:
  - name: rest
    port: 8003
    targetPort: 8003
  - name: grpc
    port: 50055
    targetPort: 50055
  type: ClusterIP