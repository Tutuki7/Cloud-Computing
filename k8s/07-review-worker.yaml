apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-worker
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: review-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: review-worker
    spec:
      volumes:
        - name: gcp-sa-secret
          secret:
            secretName: gcp-sa-secret
 
      containers:
        - name: review-worker
          image: jrcarrasqueira/review-worker:v1.0
          imagePullPolicy: Always
          env:
            - name: DB_HOST
              value: postgres-ratings
            - name: DB_NAME
              value: ratings_db
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: group8-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: group8-secret
                  key: DB_PASSWORD
            - name: PROJECT_ID
              valueFrom:
                configMapKeyRef:
                  name: group8-config
                  key: PROJECT_ID
            - name: REGION
              valueFrom:
                configMapKeyRef:
                  name: group8-config
                  key: REGION
            - name: PUBSUB_SUBSCRIPTION
              valueFrom:
                configMapKeyRef:
                  name: group8-config
                  key: PUBSUB_SUBSCRIPTION
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/var/secrets/google/sa-key.json"
          volumeMounts:
            - name: gcp-sa-secret
              mountPath: /var/secrets/google
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"