apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendations-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendations-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8004"
      labels:
        app: recommendations-service
    spec:
      volumes:
        - name: gcp-sa-secret
          secret:
            secretName: gcp-sa-secret
      containers:
      - name: recommendations-service
        image: jrcarrasqueira/recommendations-service:v7
        imagePullPolicy: Always
        ports:
        - name: rest
          containerPort: 8004
        - name: grpc
          containerPort: 50056
        env:
        - name: DB_HOST
          value: postgres-recommendations
        - name: DB_NAME
          value: recommendations_db
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: group8-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: group8-secret
              key: DB_PASSWORD
        - name: REST_PORT
          valueFrom:
            configMapKeyRef:
              name: group8-config
              key: RECOMMENDATIONS_REST_PORT
        - name: GRPC_PORT
          valueFrom:
            configMapKeyRef:
              name: group8-config
              key: RECOMMENDATIONS_GRPC_PORT
        - name: REVIEW_GRPC_URL
          valueFrom:
            configMapKeyRef:
              name: group8-config
              key: REVIEW_GRPC_URL
        - name: USER_GRPC_URL
          valueFrom:
            configMapKeyRef:
              name: group8-config
              key: USER_GRPC_URL
        - name: MOVIE_GRPC_URL
          valueFrom:
            configMapKeyRef:
              name: group8-config
              key: MOVIE_GRPC_URL
        - name: PROJECT_ID
          valueFrom:
            configMapKeyRef:
              name: group8-config
              key: PROJECT_ID
        - name: REGION
          valueFrom:
            configMapKeyRef:
              name: group8-config
              key: REGION
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/var/secrets/google/sa-key.json"
        - name: KEYCLOAK_URL
          valueFrom:
            configMapKeyRef:
              name: group8-config
              key: KEYCLOAK_URL
        - name: KEYCLOAK_REALM
          valueFrom:
            configMapKeyRef:
              name: group8-config
              key: KEYCLOAK_REALM
        - name: KEYCLOAK_CLIENT_ID
          valueFrom:
            configMapKeyRef:
              name: group8-config
              key: KEYCLOAK_CLIENT_ID
        - name: KEYCLOAK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: group8-secret
              key: KEYCLOAK_CLIENT_SECRET
        - name: ROOT_PATH
          value: "/recommendations-service"
        volumeMounts:
          - name: gcp-sa-secret
            mountPath: /var/secrets/google
            readOnly: true
        readinessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 30
          periodSeconds: 30
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: recommendations-service
  namespace: default
spec:
  selector:
    app: recommendations-service
  ports:
  - name: rest
    port: 8004
    targetPort: 8004
  - name: grpc
    port: 50056
    targetPort: 50056
  type: ClusterIP