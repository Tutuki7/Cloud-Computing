# Prometheus Postgres Exporters — one per database
# Credentials pulled from the same group8-secret used by the databases
# Each exporter exposes metrics on port 9187 and is auto-scraped by Prometheus

# ──────────────────────────────────────────
# MOVIES
# ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter-movies
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter-movies
  template:
    metadata:
      labels:
        app: postgres-exporter-movies
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
    spec:
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:latest
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: group8-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: group8-secret
                  key: DB_PASSWORD
            - name: DATA_SOURCE_NAME
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-movies:5432/movies_db?sslmode=disable"
          ports:
            - containerPort: 9187
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter-movies
  namespace: default
  labels:
    app: postgres-exporter-movies
spec:
  selector:
    app: postgres-exporter-movies
  ports:
    - port: 9187
      targetPort: 9187

